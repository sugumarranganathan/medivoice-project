<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medicine Safety Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 950px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #0d6efd;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .camera-box {
      display: none;
      margin: 20px auto;
    }

    video, canvas {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      border: 2px solid #ddd;
      background: #000;
    }

    .btn {
      padding: 14px 22px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      min-width: 180px;
    }

    .btn-primary {
      background: #0d6efd;
      color: white;
    }

    .btn-success {
      background: #198754;
      color: white;
    }

    .btn-warning {
      background: #fd7e14;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #333;
      min-height: 30px;
    }

    .preview-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .preview-card {
      width: 260px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px;
    }

    .preview-card h3 {
      margin: 8px 0;
      font-size: 18px;
      color: #333;
    }

    .preview-card img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #d63384;
    }

    .voice-tip {
      margin-top: 12px;
      font-size: 15px;
      color: #666;
    }

    .error-box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .btn {
        width: 90%;
        font-size: 17px;
      }
      .preview-card {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Medicine Safety Checker</h1>
    <div class="subtitle">Capture Prescription and Medicine Strip for Safety Analysis</div>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form id="uploadForm" method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="file" id="prescriptionInput" name="prescription" accept="image/*" class="hidden">
      <input type="file" id="medicineInput" name="medicine" accept="image/*" class="hidden">

      <!-- START BUTTON -->
      <button type="button" id="startBtn" class="btn btn-primary">Start Voice Guidance</button>

      <!-- CAMERA SECTION -->
      <div class="camera-box" id="cameraBox">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <br>
        <button type="button" id="captureBtn" class="btn btn-success">Capture Image</button>
        <button type="button" id="retakeBtn" class="btn btn-warning hidden">Retake</button>
      </div>

      <!-- IMAGE PREVIEW -->
      <div class="preview-row">
        <div class="preview-card">
          <h3>Prescription Image</h3>
          <img id="prescriptionPreview" src="" alt="Prescription Preview" class="hidden">
        </div>
        <div class="preview-card">
          <h3>Medicine Strip Image</h3>
          <img id="medicinePreview" src="" alt="Medicine Preview" class="hidden">
        </div>
      </div>

      <!-- ANALYSE BUTTON -->
      <button type="submit" id="analyseBtn" class="btn btn-danger hidden">Analyse Images</button>

      <!-- STATUS -->
      <div class="status" id="statusText">Press Start to begin</div>
      <div class="voice-tip">Voice commands: "start", "capture", "retake", "analyse"</div>
      <div class="loading" id="loadingText">⏳ Analysing... Please wait</div>
    </form>
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const cameraBox = document.getElementById("cameraBox");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const captureBtn = document.getElementById("captureBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const prescriptionInput = document.getElementById("prescriptionInput");
    const medicineInput = document.getElementById("medicineInput");
    const prescriptionPreview = document.getElementById("prescriptionPreview");
    const medicinePreview = document.getElementById("medicinePreview");
    const analyseBtn = document.getElementById("analyseBtn");
    const statusText = document.getElementById("statusText");
    const loadingText = document.getElementById("loadingText");
    const uploadForm = document.getElementById("uploadForm");

    let stream = null;
    let currentStep = "prescription";
    let isSubmitting = false;

    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }
      console.log("VOICE:", text);
    }

    function updateStatus(text) {
      statusText.textContent = text;
      speak(text);
    }

    async function startCamera() {
      try {
        stopCamera();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = stream;
        cameraBox.style.display = "block";
        captureBtn.classList.remove("hidden");
        retakeBtn.classList.add("hidden");
      } catch (err) {
        console.error("Camera error:", err);
        updateStatus("Camera access failed. Please allow camera permission.");
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function dataURLtoFile(dataurl, filename) {
      const arr = dataurl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      return new File([u8arr], filename, { type: mime });
    }

    function setFileInput(fileInput, file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
    }

    function captureImage() {
      if (!stream) {
        updateStatus("Camera is not ready.");
        return;
      }

      const context = canvas.getContext("2d");
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
      const fileName = currentStep + "_" + Date.now() + ".jpg";
      const file = dataURLtoFile(dataUrl, fileName);

      if (currentStep === "prescription") {
        setFileInput(prescriptionInput, file);
        prescriptionPreview.src = dataUrl;
        prescriptionPreview.classList.remove("hidden");

        currentStep = "medicine";
        retakeBtn.classList.remove("hidden");
        updateStatus("Prescription captured. Now capture medicine strip.");
      } else if (currentStep === "medicine") {
        setFileInput(medicineInput, file);
        medicinePreview.src = dataUrl;
        medicinePreview.classList.remove("hidden");

        currentStep = "done";
        retakeBtn.classList.remove("hidden");
        stopCamera();
        cameraBox.style.display = "none";

        analyseBtn.classList.remove("hidden");
        analyseBtn.style.display = "inline-block";

        updateStatus("Both images captured. Press Analyse Images.");
      }
    }

    function retakeImage() {
      if (currentStep === "medicine") {
        prescriptionInput.value = "";
        prescriptionPreview.src = "";
        prescriptionPreview.classList.add("hidden");
        currentStep = "prescription";
        analyseBtn.classList.add("hidden");
        updateStatus("Retake prescription image.");
        startCamera();
      } else if (currentStep === "done") {
        medicineInput.value = "";
        medicinePreview.src = "";
        medicinePreview.classList.add("hidden");
        currentStep = "medicine";
        analyseBtn.classList.add("hidden");
        updateStatus("Retake medicine strip image.");
        startCamera();
      } else {
        updateStatus("Nothing to retake now.");
      }
    }

    startBtn.addEventListener("click", async () => {
      currentStep = "prescription";
      isSubmitting = false;
      analyseBtn.classList.add("hidden");
      analyseBtn.disabled = false;
      analyseBtn.textContent = "Analyse Images";
      loadingText.style.display = "none";

      prescriptionInput.value = "";
      medicineInput.value = "";
      prescriptionPreview.src = "";
      medicinePreview.src = "";
      prescriptionPreview.classList.add("hidden");
      medicinePreview.classList.add("hidden");

      updateStatus("Camera starting. Please capture prescription image.");
      await startCamera();
    });

    captureBtn.addEventListener("click", captureImage);
    retakeBtn.addEventListener("click", retakeImage);

    uploadForm.addEventListener("submit", function(e) {
      if (isSubmitting) {
        e.preventDefault();
        return;
      }

      if (!prescriptionInput.files.length || !medicineInput.files.length) {
        e.preventDefault();
        updateStatus("Please capture both images before analysis.");
        return;
      }

      isSubmitting = true;
      analyseBtn.disabled = true;
      analyseBtn.textContent = "Analysing...";
      loadingText.style.display = "block";
      stopCamera();
      updateStatus("Analysing images. Please wait.");
    });

    let recognition;
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = "en-US";

      recognition.onresult = function(event) {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        console.log("Heard:", transcript);

        if (transcript.includes("start")) {
          startBtn.click();
        } else if (transcript.includes("capture")) {
          captureBtn.click();
        } else if (transcript.includes("retake")) {
          retakeBtn.click();
        } else if (transcript.includes("analyse") || transcript.includes("analyze")) {
          if (!analyseBtn.classList.contains("hidden") && !isSubmitting) {
            analyseBtn.click();
          }
        }
      };

      recognition.onerror = function(event) {
        console.log("Speech recognition error:", event.error);
      };

      window.addEventListener("load", () => {
        try {
          recognition.start();
        } catch (e) {
          console.log("Recognition already started");
        }
      });
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        speak("Welcome. Press start or say start to begin.");
      }, 700);
    });
  </script>
</body>
</html>
