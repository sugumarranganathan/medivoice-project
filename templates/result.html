<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analysis Result</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 20px;
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      background: #fff3cd;
      border: 2px solid #ffe69c;
      line-height: 1.5;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      text-align: left;
    }

    .box h3 {
      margin-top: 0;
      color: #333;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: Arial, sans-serif;
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 20px;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
    }

    .btn:hover {
      background: #0b5ed7;
    }

    .center {
      text-align: center;
    }

    @media (max-width: 600px) {
      .result {
        font-size: 18px;
      }
      .btn {
        width: 90%;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Medicine Safety Analysis Result</h1>

    <div class="result" id="resultText">
      {{ result }}
    </div>

    <div class="box">
      <h3>Prescription Extracted Text</h3>
      <pre>{{ prescription_text }}</pre>
    </div>

    <div class="box">
      <h3>Medicine Strip Extracted Text</h3>
      <pre>{{ medicine_text }}</pre>
    </div>

    <div class="center">
      <a href="/" class="btn">⬅ Try Again</a>
    </div>
  </div>

  <script>
    window.addEventListener("load", function () {
      const resultElement = document.getElementById("resultText");
      if (resultElement && 'speechSynthesis' in window) {
        const text = resultElement.innerText.trim();
        if (text) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 1;
          utterance.pitch = 1;
          window.speechSynthesis.speak(utterance);
        }
      }
    });
  </script>
</body>
</html>
